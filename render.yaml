services:
  - type: web
    name: uap-index
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: SITE_URL
        value: https://uapindex.com
      - key: SITE_NAME
        value: The UAP Index
      - key: SITE_OWNER_ORG
        value: The UAP Index
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
  - type: cron
    name: uap-index-daily-pipeline
    runtime: python
    schedule: "0 15,22 * * *"
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python run_daily.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: SITE_URL
        value: https://uapindex.com
      - key: SITE_NAME
        value: The UAP Index
      - key: SITE_OWNER_ORG
        value: The UAP Index
      - key: LOG_LEVEL
        value: INFO
